    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Was ist eine Liquiditätsplanung?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Eine Liquiditätsplanung ist eine systematische Vorausschau aller erwarteten Ein- und Auszahlungen eines Unternehmens über einen definierten Zeitraum. Sie zeigt, ob ein Unternehmen zu jedem Zeitpunkt zahlungsfähig bleibt, identifiziert Liquiditätslücken frühzeitig und ist Pflichtbestandteil jedes fundierten Businessplans."
            }
          },
          {
            "@type": "Question",
            "name": "Wie erstelle ich eine Cashflow-Prognose für meinen Businessplan?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Eine Cashflow-Prognose entsteht in vier Schritten: 1) Startkapital festlegen, 2) erwartete Einzahlungen pro Periode schätzen (Umsatz, Eigenkapital, Darlehen), 3) Auszahlungen zuordnen (Personal, Material, Miete, Steuern), 4) den kumulierten Kassenstand Periode für Periode fortschreiben. LiquidHub automatisiert die Berechnung und visualisiert das Ergebnis als Linien-, Area- oder Wasserfall-Chart."
            }
          },
          {
            "@type": "Question",
            "name": "Was ist der Unterschied zwischen Rentabilität und Liquidität?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Rentabilität misst den Gewinn im Verhältnis zum Umsatz oder eingesetzten Kapital — sie sagt, ob das Geschäftsmodell wirtschaftlich funktioniert. Liquidität hingegen misst die jederzeitige Zahlungsfähigkeit. Ein Unternehmen kann rentabel sein und trotzdem in eine Liquiditätskrise geraten, wenn Zahlungseingänge zeitlich verzögert sind."
            }
          },
          {
            "@type": "Question",
            "name": "Welche Daten brauche ich für eine Liquiditätsplanung?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Für jede Planungsperiode (meist Monat oder Quartal) benötigen Sie: Label, erwarteter Umsatz, erwartete Kosten, tatsächliche Einzahlungen (Cash In) und Auszahlungen (Cash Out). LiquidHub importiert diese Daten wahlweise als CSV oder JSON und zeigt sofort die resultierenden Grafiken an."
            }
          },
          {
            "@type": "Question",
            "name": "Ist LiquidHub kostenlos?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ja. LiquidHub ist ein kostenfreies Tool der gemeinnützigen PEBS gUG. Es speichert keine Daten auf Servern, alle Eingaben verbleiben im Browser-Speicher (localStorage). Der Export der Grafiken als PNG, CSV oder JSON ist uneingeschränkt möglich."
            }
          },
          {
            "@type": "Question",
            "name": "Kann ich LiquidHub statt Excel für den Finanzplan nutzen?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "LiquidHub ist eine spezialisierte Alternative zu Excel-Vorlagen für Finanzpläne: statt statischer Tabellen erhalten Sie interaktive, live aktualisierte Visualisierungen mit 13 Chart-Typen, individuellen Farbschemen, Multi-Währungs-Unterstützung und Export-Funktionen. Für einfache Gründungs-Businesspläne, Investoren-Pitches und Controlling-Reviews ist das Tool eine vollwertige Alternative."
            }
          },
          {
            "@type": "Question",
            "name": "Welche Chart-Typen unterstützt LiquidHub?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Balkendiagramm, gestapelte Balken, horizontale Balken, horizontale gestapelte Balken, Liniendiagramm, Flächendiagramm, Step-Linie, Kreisdiagramm, Donut, Polar-Area, Wasserfall und Combo-Charts mit zwei Y-Achsen. Jeder Chart-Typ lässt sich einzeln konfigurieren: Farbpalette, eigene Hex-Farben, Achsenbeschriftung, Legendenposition, Titel."
            }
          },
          {
            "@type": "Question",
            "name": "Unterstützt LiquidHub mehrere Währungen?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ja. Neben Euro werden US-Dollar, Britisches Pfund, Schweizer Franken, Japanischer Yen, Chinesischer Yuan, Schwedische, Norwegische und Dänische Krone, Polnischer Złoty, Tschechische Krone sowie Kanadischer und Australischer Dollar unterstützt. Ein Umschalter im Header wechselt alle Grafiken und KPIs live."
            }
          }
        ]
      }
