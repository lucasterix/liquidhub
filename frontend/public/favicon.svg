<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="100%" stop-color="#7bf0c4"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="60%" stop-color="#7bf0c4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="url(#accent)" stroke-opacity="0.55" stroke-width="1"/>
  <!-- bar columns -->
  <rect x="12" y="32" width="7" height="18" rx="2" fill="#6ea8ff" fill-opacity="0.45"/>
  <rect x="22" y="24" width="7" height="26" rx="2" fill="#6ea8ff" fill-opacity="0.7"/>
  <rect x="32" y="28" width="7" height="22" rx="2" fill="#7bf0c4" fill-opacity="0.7"/>
  <rect x="42" y="18" width="7" height="32" rx="2" fill="#7bf0c4" fill-opacity="0.9"/>
  <!-- rising trend line -->
  <path d="M12 38 L25 30 L35 34 L50 16" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arrow head -->
  <path d="M44 14 L52 14 L52 22" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- dots -->
  <circle cx="12" cy="38" r="2" fill="#e9eefb"/>
  <circle cx="25" cy="30" r="2" fill="#e9eefb"/>
  <circle cx="35" cy="34" r="2" fill="#e9eefb"/>
  <circle cx="50" cy="16" r="2" fill="#e9eefb"/>
</svg>
